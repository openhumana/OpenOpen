<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Humana - Secure Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b1021;
            background-image: radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.15), transparent 60%);
            color: #e5e7eb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .checkout-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .brand-header p {
            font-size: 14px;
            color: #6b7280;
            margin-top: 6px;
        }

        .card {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: opacity 0.4s ease;
        }

        .form-section {
            margin-bottom: 24px;
        }

        .field-label {
            font-size: 13px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 8px;
            display: block;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 12px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-height: 46px;
            display: flex;
            align-items: center;
        }

        .stripe-field {
            width: 100%;
            height: 20px;
        }

        .input-wrapper:focus-within,
        .input-wrapper.focused {
            border-color: #6366f1;
            box-shadow: 0 0 0 1px #6366f1;
        }

        .input-wrapper.invalid {
            border-color: #ef4444;
        }

        .split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s;
            margin-top: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .plan-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 0;
        }

        .plan-btn {
            padding: 14px 12px;
            border: 1px solid #374151;
            background: #1f2937;
            border-radius: 8px;
            color: #d1d5db;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .plan-btn.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
            color: #fff;
        }

        .plan-btn:hover:not(.active) {
            border-color: #4b5563;
        }

        .order-summary {
            background: rgba(99, 102, 241, 0.06);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 10px;
            padding: 16px 18px;
            margin-bottom: 24px;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-plan-name {
            font-size: 14px;
            font-weight: 500;
            color: #e5e7eb;
        }

        .order-plan-price {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .order-period {
            font-size: 13px;
            color: #6b7280;
            font-weight: 400;
        }

        .divider {
            height: 1px;
            background: #374151;
            margin: 24px 0;
        }

        .success-view {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: #22c55e;
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
        }

        .success-view h2 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.3;
        }

        .success-view p {
            color: #9ca3af;
            font-size: 15px;
            line-height: 1.5;
        }

        .error-message {
            display: none;
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .footer svg {
            opacity: 0.5;
        }

        #paypal-button-container {
            display: none;
            margin-bottom: 0;
        }

        #paypal-button-container > div {
            max-height: 55px;
            overflow: hidden;
        }
    </style>
    <script
        src="https://www.paypal.com/sdk/js?components=buttons,card-fields&client-id={{ processor_id }}&intent=capture&currency=USD&commit=true&vault=false&enable-funding=card&disable-funding=paylater,credit"></script>
</head>

<body>
    <div class="checkout-container">
        <div class="brand-header">
            <h1>Open Humana</h1>
            <p>Secure checkout</p>
        </div>

        <div class="card" id="checkout-card">

            <div class="form-section">
                <label class="field-label">Select Plan</label>
                <div class="plan-selector">
                    <div class="plan-btn" data-plan="starter" data-name="Hire One Employee" data-price="99">
                        <div style="font-weight:600;margin-bottom:4px;font-size:14px;">Hire One Employee</div>
                        <div>$99/mo</div>
                    </div>
                    <div class="plan-btn" data-plan="business" data-name="Hire a Team" data-price="399">
                        <div style="font-weight:600;margin-bottom:4px;font-size:14px;">Hire a Team</div>
                        <div>$399/mo</div>
                    </div>
                </div>
            </div>

            <div class="order-summary" id="orderSummary">
                <div class="order-row">
                    <span class="order-plan-name" id="orderPlanName">Hire One Employee</span>
                    <span class="order-plan-price" id="orderPlanPrice">$99<span class="order-period">/mo</span></span>
                </div>
            </div>

            <div class="form-section">
                <label class="field-label">Card Information</label>

                <div id="paypal-button-container"></div>

                <div class="input-group" id="advanced-card-form">
                    <div class="input-wrapper" id="wrapper-number">
                        <div id="card-number" class="stripe-field"></div>
                    </div>

                    <div class="split-grid">
                        <div class="input-wrapper" id="wrapper-expiry">
                            <div id="card-expiry" class="stripe-field"></div>
                        </div>
                        <div class="input-wrapper" id="wrapper-cvv">
                            <div id="card-cvv" class="stripe-field"></div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-primary" id="payBtn">
                <span id="btnText">Pay Now</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
            <div class="error-message" id="payError"></div>

        </div>

        <div class="card success-view" id="success-card">
            <div class="success-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2>Thank you for signing up with Open Humana.</h2>
            <p>Your Digital Employee is getting ready and is on its way. Check your email for next steps.</p>
        </div>

        <div class="footer">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            Secured with 256-bit SSL encryption
        </div>
    </div>

    <script>
        const payBtn = document.getElementById('payBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const payError = document.getElementById('payError');
        const planButtons = document.querySelectorAll('.plan-btn');
        const orderPlanName = document.getElementById('orderPlanName');
        const orderPlanPrice = document.getElementById('orderPlanPrice');

        const checkoutCard = document.getElementById('checkout-card');
        const successCard = document.getElementById('success-card');
        const advancedCardForm = document.getElementById('advanced-card-form');
        const paypalBtnContainer = document.getElementById('paypal-button-container');

        const planData = {
            starter: { name: 'Hire One Employee', price: 99 },
            business: { name: 'Hire a Team', price: 399 }
        };

        let selectedPlan = ("{{ selected_plan or '' }}" || localStorage.getItem('selected_plan') || 'starter').toLowerCase();
        if (!planData[selectedPlan]) selectedPlan = 'starter';
        let cardFieldsInstance = null;
        let isProcessing = false;

        function updatePlanSelection() {
            planButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.plan === selectedPlan);
            });
            localStorage.setItem('selected_plan', selectedPlan);
            const plan = planData[selectedPlan];
            orderPlanName.textContent = plan.name;
            orderPlanPrice.innerHTML = '$' + plan.price + '<span class="order-period">/mo</span>';
            btnText.textContent = 'Pay $' + plan.price;
        }

        planButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                selectedPlan = btn.dataset.plan;
                updatePlanSelection();
            });
        });
        updatePlanSelection();

        function showError(msg) {
            payError.style.display = 'block';
            payError.textContent = msg;
            setLoading(false);
        }

        function showSuccess() {
            checkoutCard.style.display = 'none';
            successCard.style.display = 'block';
            setTimeout(() => { window.location.href = '/'; }, 4000);
        }

        function setLoading(loading) {
            isProcessing = loading;
            payBtn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'block';
            btnSpinner.style.display = loading ? 'block' : 'none';
        }

        function getAmount() {
            return planData[selectedPlan]?.price || 99;
        }

        const processor = window.paypal;

        if (processor && processor.CardFields) {
            try {
                const cardFields = processor.CardFields({
                    createOrder: async function (data) {
                        const orderRes = await fetch('/api/paypal/create-order', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                            body: JSON.stringify({ amount: getAmount(), plan: selectedPlan })
                        });
                        const orderJson = await orderRes.json();
                        if (!orderRes.ok) throw new Error(orderJson.error || 'Create order failed');
                        return orderJson.id || orderJson.result?.id;
                    },
                    onApprove: async function (data) {
                        try {
                            const capRes = await fetch('/api/paypal/capture-order', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                                body: JSON.stringify({ order_id: data.orderID, plan: selectedPlan })
                            });
                            const capJson = await capRes.json();
                            if (!capRes.ok) throw new Error(capJson.error || 'Capture failed');
                            showSuccess();
                        } catch (err) {
                            showError(err.message || 'Payment failed');
                        }
                    },
                    onError: function (err) {
                        showError('An error occurred. Your card was not charged.');
                    },
                    style: {
                        input: {
                            'font-size': '15px',
                            'font-family': 'Inter, sans-serif',
                            'color': '#ffffff',
                            'letter-spacing': '0.03em'
                        },
                        '.invalid': {
                            'color': '#ef4444'
                        }
                    }
                });

                if (cardFields.isEligible()) {
                    const numberField = cardFields.NumberField();
                    const expiryField = cardFields.ExpiryField();
                    const cvvField = cardFields.CVVField();

                    numberField.render('#card-number');
                    expiryField.render('#card-expiry');
                    cvvField.render('#card-cvv');

                    [
                        { field: numberField, wrapperId: 'wrapper-number' },
                        { field: expiryField, wrapperId: 'wrapper-expiry' },
                        { field: cvvField, wrapperId: 'wrapper-cvv' }
                    ].forEach(item => {
                        item.field.on('focus', () => document.getElementById(item.wrapperId).classList.add('focused'));
                        item.field.on('blur', () => document.getElementById(item.wrapperId).classList.remove('focused'));
                        item.field.on('validityChange', (event) => {
                            if (!event.isValid && !event.isEmpty) {
                                document.getElementById(item.wrapperId).classList.add('invalid');
                            } else {
                                document.getElementById(item.wrapperId).classList.remove('invalid');
                            }
                        });
                    });

                    cardFieldsInstance = cardFields;
                } else {
                    fallbackToButtons();
                }
            } catch (error) {
                console.warn("Card form init failed:", error);
                fallbackToButtons();
            }
        } else {
            fallbackToButtons();
        }

        function createOrderHandler(data, actions) {
            return fetch('/api/paypal/create-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                body: JSON.stringify({ amount: getAmount(), plan: selectedPlan })
            }).then(r => r.json()).then(json => {
                if (json.error) throw new Error(json.error);
                return json.id || json.result?.id;
            });
        }

        function captureOrderHandler(data) {
            return fetch('/api/paypal/capture-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                body: JSON.stringify({ order_id: data.orderID, plan: selectedPlan })
            }).then(r => r.json()).then(json => {
                if (json.error) throw new Error(json.error);
                showSuccess();
            }).catch(err => showError(err.message || 'Payment failed'));
        }

        function fallbackToButtons() {
            advancedCardForm.style.display = 'none';
            payBtn.style.display = 'none';
            paypalBtnContainer.style.display = 'block';

            const FUNDING = processor.FUNDING;
            const cardBtn = processor.Buttons({
                fundingSource: FUNDING.CARD,
                style: { color: 'black', shape: 'rect', label: 'pay', height: 48 },
                createOrder: createOrderHandler,
                onApprove: captureOrderHandler,
                onError: function () { showError('An error occurred during payment processing.'); }
            });

            if (cardBtn.isEligible()) {
                cardBtn.render('#paypal-button-container');
            } else {
                processor.Buttons({
                    style: { layout: 'vertical', color: 'black', shape: 'rect', label: 'pay', height: 48, tagline: false },
                    createOrder: createOrderHandler,
                    onApprove: captureOrderHandler,
                    onError: function () { showError('An error occurred during payment processing.'); }
                }).render('#paypal-button-container');
            }
        }

        payBtn.addEventListener('click', async () => {
            if (isProcessing) return;
            payError.style.display = 'none';

            if (cardFieldsInstance) {
                setLoading(true);
                try {
                    await cardFieldsInstance.submit({ contingencies: ['SCA_ALWAYS'] });
                } catch (err) {
                    showError(err.message || "Payment attempt failed.");
                }
            } else {
                showError('Payment processor is loading. Please wait or refresh.');
            }
        });

    </script>
</body>

</html>
