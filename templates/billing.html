<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Humana - Secure Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b1021;
            background-image: radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.15), transparent 60%);
            color: #e5e7eb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .checkout-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .card {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: opacity 0.4s ease;
        }

        .form-section {
            margin-bottom: 24px;
        }

        .field-label {
            font-size: 13px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 8px;
            display: block;
        }

        /* Stripe-like Inputs */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 12px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-height: 46px;
            /* explicitly size for paypal iframe */
            display: flex;
            align-items: center;
        }

        /* The div holding the paypal iframe must expand */
        .stripe-field {
            width: 100%;
            height: 20px;
        }

        .input-wrapper:focus-within,
        .input-wrapper.focused {
            border-color: #6366f1;
            box-shadow: 0 0 0 1px #6366f1;
        }

        .input-wrapper.invalid {
            border-color: #ef4444;
        }

        .split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Standard text inputs for amounts */
        input.standard-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s;
            margin-top: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .plan-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .plan-btn {
            padding: 14px 12px;
            border: 1px solid #374151;
            background: #1f2937;
            border-radius: 8px;
            color: #d1d5db;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .plan-btn.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
            color: #fff;
        }

        .divider {
            height: 1px;
            background: #374151;
            margin: 24px 0;
        }

        /* Success State */
        .success-view {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: #22c55e;
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
        }

        .success-view h2 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.3;
        }

        .success-view p {
            color: #9ca3af;
            font-size: 15px;
            line-height: 1.5;
        }

        .error-message {
            display: none;
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
    <!-- We request components=buttons,card-fields to get the Advanced Credit and Debit Card fields -->
    <script
        src="https://www.paypal.com/sdk/js?components=buttons,card-fields&client-id={{ processor_id }}&intent=capture&currency=USD&commit=true&vault=false"></script>
</head>

<body>
    <div class="checkout-container">
        <div class="brand-header">
            <h1>Open Humana</h1>
        </div>

        <div class="card" id="checkout-card">

            <div class="form-section">
                <label class="field-label">Select Plan</label>
                <div class="plan-selector">
                    <div class="plan-btn" data-plan="starter">
                        <div style="font-weight:600;margin-bottom:4px;font-size:14px;">Starter</div>
                        <div>$99/mo</div>
                    </div>
                    <div class="plan-btn" data-plan="business">
                        <div style="font-weight:600;margin-bottom:4px;font-size:14px;">Business</div>
                        <div>$399/mo</div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <label class="field-label">Refill Amount</label>
                <div class="input-wrapper">
                    <span style="color:#9ca3af;margin-right:8px;">$</span>
                    <input id="refillAmount" class="standard-input" type="number" min="{{ min_refill }}" step="0.01"
                        value="{{ default_refill }}" />
                </div>
            </div>

            <div class="divider"></div>

            <div class="form-section">
                <label class="field-label">Payment Details</label>

                <!-- PayPal Smart Buttons Fallback Container (Hidden by default, shown if card-fields fail or user chooses PayPal) -->
                <div id="paypal-button-container" style="display:none;margin-bottom:16px;"></div>

                <div class="input-group" id="advanced-card-form">
                    <div class="input-wrapper" id="wrapper-number">
                        <!-- PayPal will inject the iframe here -->
                        <div id="card-number" class="stripe-field"></div>
                    </div>

                    <div class="split-grid">
                        <div class="input-wrapper" id="wrapper-expiry">
                            <div id="card-expiry" class="stripe-field"></div>
                        </div>
                        <div class="input-wrapper" id="wrapper-cvv">
                            <div id="card-cvv" class="stripe-field"></div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-primary" id="payBtn">
                <span id="btnText">Pay Now</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
            <div class="error-message" id="payError"></div>

        </div>

        <div class="card success-view" id="success-card">
            <div class="success-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2>Thank you for signing up with Open Humana.</h2>
            <p>Your Digital Employee is getting ready and is on its way. Check your email for next steps.</p>
        </div>

        <div class="footer">
            Powered securely
        </div>
    </div>

    <script>
        const payBtn = document.getElementById('payBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const payError = document.getElementById('payError');
        const refillAmountInput = document.getElementById('refillAmount');
        const minRefill = parseFloat("{{ '%.2f' % min_refill }}");
        const defaultRefill = parseFloat("{{ '%.2f' % default_refill }}");
        const planButtons = document.querySelectorAll('.plan-btn');

        const checkoutCard = document.getElementById('checkout-card');
        const successCard = document.getElementById('success-card');
        const advancedCardForm = document.getElementById('advanced-card-form');
        const paypalBtnContainer = document.getElementById('paypal-button-container');

        let selectedPlan = ("{{ selected_plan or '' }}" || localStorage.getItem('selected_plan') || 'starter').toLowerCase();
        let cardFieldsInstance = null;
        let isProcessing = false;

        // Plan Selection Logic
        function updatePlanSelection() {
            planButtons.forEach(btn => {
                if (btn.dataset.plan === selectedPlan) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            localStorage.setItem('selected_plan', selectedPlan);
        }

        planButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                selectedPlan = btn.dataset.plan;
                updatePlanSelection();
            });
        });
        updatePlanSelection();

        function showError(msg) {
            payError.style.display = 'block';
            payError.textContent = msg;
            setLoading(false);
        }

        function showSuccess() {
            checkoutCard.style.display = 'none';
            successCard.style.display = 'block';
            // Redirect after 4 seconds so they can read the message
            setTimeout(() => { window.location.href = '/dashboard'; }, 4000);
        }

        function setLoading(loading) {
            isProcessing = loading;
            payBtn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'block';
            btnSpinner.style.display = loading ? 'block' : 'none';
        }

        // Initialize PayPal SDK
        const processor = window.paypal;

        // Try initializing CardFields (Advanced form)
        if (processor.CardFields) {
            try {
                const cardFields = processor.CardFields({
                    createOrder: async function (data) {
                        const amount = parseFloat(refillAmountInput.value || defaultRefill);
                        if (isNaN(amount) || amount < minRefill) {
                            showError(`Minimum refill is $${minRefill.toFixed(2)}`);
                            throw new Error('Invalid amount');
                        }
                        const orderRes = await fetch('/api/paypal/create-order', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                            body: JSON.stringify({ amount, plan: selectedPlan })
                        });
                        const orderJson = await orderRes.json();
                        if (!orderRes.ok) { throw new Error(orderJson.error || 'Create order failed'); }
                        const orderId = orderJson.id || orderJson.result?.id;
                        if (!orderId) throw new Error('Missing order id');
                        return orderId;
                    },
                    onApprove: async function (data) {
                        try {
                            const capRes = await fetch('/api/paypal/capture-order', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                                body: JSON.stringify({ order_id: data.orderID, plan: selectedPlan })
                            });
                            const capJson = await capRes.json();
                            if (!capRes.ok) throw new Error(capJson.error || 'Capture failed');
                            showSuccess();
                        } catch (err) {
                            showError(err.message || 'Payment failed');
                        }
                    },
                    onError: function (err) {
                        showError('An error occurred. Your card was not charged.');
                    },
                    style: {
                        input: {
                            'font-size': '15px',
                            'font-family': 'Inter, sans-serif',
                            'color': '#ffffff',
                            'letter-spacing': '0.03em'
                        },
                        '.invalid': {
                            'color': '#ef4444'
                        }
                    }
                });

                if (cardFields.isEligible()) {
                    // Render fields into our wrappers
                    const numberField = cardFields.NumberField();
                    const expiryField = cardFields.ExpiryField();
                    const cvvField = cardFields.CVVField();

                    numberField.render('#card-number');
                    expiryField.render('#card-expiry');
                    cvvField.render('#card-cvv');

                    // Add focus styles to our wrappers based on iframe events
                    [
                        { field: numberField, wrapperId: 'wrapper-number' },
                        { field: expiryField, wrapperId: 'wrapper-expiry' },
                        { field: cvvField, wrapperId: 'wrapper-cvv' }
                    ].forEach(item => {
                        item.field.on('focus', () => document.getElementById(item.wrapperId).classList.add('focused'));
                        item.field.on('blur', () => document.getElementById(item.wrapperId).classList.remove('focused'));
                        item.field.on('validityChange', (event) => {
                            if (!event.isValid && !event.isEmpty) {
                                document.getElementById(item.wrapperId).classList.add('invalid');
                            } else {
                                document.getElementById(item.wrapperId).classList.remove('invalid');
                            }
                        });
                    });

                    cardFieldsInstance = cardFields;
                } else {
                    fallbackToButtons();
                }
            } catch (error) {
                console.warn("CardFields initialization failed:", error);
                fallbackToButtons();
            }
        } else {
            fallbackToButtons();
        }

        function fallbackToButtons() {
            // Hide the custom card form and standard submit button
            advancedCardForm.style.display = 'none';
            payBtn.style.display = 'none';
            // Show the standard PayPal buttons container
            paypalBtnContainer.style.display = 'block';

            processor.Buttons({
                style: {
                    layout: 'vertical',
                    color: 'white', // Stripe-like aesthetic prefers 'white' or 'black' over gold
                    shape: 'rect',
                    label: 'checkout'
                },
                createOrder: async function (data, actions) {
                    const amount = parseFloat(refillAmountInput.value || defaultRefill);
                    if (isNaN(amount) || amount < minRefill) {
                        showError(`Minimum refill is $${minRefill.toFixed(2)}`);
                        throw new Error('Invalid amount');
                    }
                    const orderRes = await fetch('/api/paypal/create-order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                        body: JSON.stringify({ amount, plan: selectedPlan })
                    });
                    const orderJson = await orderRes.json();
                    if (!orderRes.ok) { throw new Error(orderJson.error || 'Create order failed'); }
                    return orderJson.id || orderJson.result?.id;
                },
                onApprove: async function (data, actions) {
                    try {
                        const capRes = await fetch('/api/paypal/capture-order', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                            body: JSON.stringify({ order_id: data.orderID, plan: selectedPlan })
                        });
                        const capJson = await capRes.json();
                        if (!capRes.ok) { throw new Error(capJson.error || 'Capture failed'); }
                        showSuccess();
                    } catch (err) {
                        showError(err.message || 'Payment failed');
                    }
                },
                onError: function (err) {
                    showError('An error occurred during payment processing.');
                }
            }).render('#paypal-button-container');
        }

        // Handle submission for the Advanced Card Fields
        payBtn.addEventListener('click', async () => {
            if (isProcessing) return;
            payError.style.display = 'none';

            const amount = parseFloat(refillAmountInput.value || defaultRefill);
            if (isNaN(amount) || amount < minRefill) {
                showError(`Minimum refill is $${minRefill.toFixed(2)}`);
                return;
            }

            if (cardFieldsInstance) {
                setLoading(true);
                try {
                    // CardFields submission internally creates the order and approves it
                    // The createOrder and onApprove callbacks we defined in processor.CardFields() will handle the backend calls
                    await cardFieldsInstance.submit({ contingencies: ['SCA_ALWAYS'] });
                } catch (err) {
                    showError(err.message || "Payment attempt failed.");
                }
            } else {
                showError('Payment processor is loading. Please wait or refresh.');
            }
        });

    </script>
</body>

</html>
