<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Open Humana</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='50' font-weight='bold' font-family='Arial'>OH</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;text-align:center;box-shadow:0 20px 50px -12px rgba(0,0,0,0.08)}
    .card-logo{margin-bottom:8px}
    .card-logo img{height:80px;width:auto}
    .card-subtitle{font-size:14px;color:#666;margin-bottom:32px}
    .card label{display:block;text-align:left;font-size:12px;font-weight:600;color:#666;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
    .input-wrap{position:relative;margin-bottom:16px}
    .input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:#999;pointer-events:none}
    .input-wrap input{width:100%;padding:14px 16px 14px 44px;background:#f5f5f5;border:2px solid #ccc;border-radius:14px;font-size:15px;font-family:inherit;color:#1a1a1a;outline:none;transition:border-color .2s}
    .input-wrap input:focus{border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(26,26,26,0.12)}
    .card-btn{width:100%;padding:14px 24px;background:#1a1a1a;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .2s}
    .card-btn:hover{background:#333}
    .card-error{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);color:#dc2626;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:500;margin-bottom:20px}
    @media(max-width:480px){.card{padding:36px 24px;margin:0 8px}}
  </style>
</head>
<body>

<div class="card">
  <div class="card-logo">
    <img src="/static/images/logo.png" alt="Open Humana">
  </div>
  <div class="card-subtitle">Create your new password</div>

  {% if error %}
  <div class="card-error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input type="hidden" name="token" value="{{ token }}">

    <label>New Password</label>
    <div class="input-wrap">
      <input type="password" name="password" placeholder="Min 8 characters" autocomplete="new-password" required minlength="8">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>

    <label>Confirm Password</label>
    <div class="input-wrap">
      <input type="password" name="confirm_password" placeholder="Repeat password" autocomplete="new-password" required minlength="8">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>

    <button type="submit" class="card-btn">Reset Password</button>
  </form>
</div>

</body>
</html>
